<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js"></script>
</head>

<body>

    <!-- Header -->
    <header>

    </header>

    <!--Main-->
    <main>
        <section class="registrasi">

            <div class="formcard">
                <h1>Registrasi</h1>

                <!-- bagian nama -->
                <form action="login.html">
                    <label for="nama">Nama:</label><br>
                    <input type="text" id="nama" required><br><br>

                    <!-- bagian email -->
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" required><br><br>

                    <!-- bagian password -->
                    <label for="password">Password:</label><br>
                    <input type="password" id="password" required><br><br>

                    <!-- bagian konfirmasi password -->
                    <label for="confirm_password">Konfirmasi Password:</label><br>
                    <input type="password" id="confirm_password" required><br><br>

                    <input type="submit" value="Daftar" onclick="return validasi()">
                    <p>Sudah punya akun? <a href="login.html">Login</a></p>
                </form>
            </div>

            <!-- Script Validasi -->
            <script>
                function validasi() {

                    const nama = document.getElementById('nama').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirm_password = document.getElementById('confirm_password').value;

                    if (nama === "" && email === "" && password === "" && confirm_password === "") {
                        alert("Kolom harus di isi");
                        return false;
                    }

                    if (nama === "") {
                        alert("Nama wajib di isi");
                        return false;
                    }

                    if (email === "") {
                        alert("Email wajib di isi");
                        return false;
                    }
                    if (!email.includes("@")) {
                        alert("Email harus mengandung karakter @");
                        return false;
                    }
                    if (password === "") {
                        alert("Password harus di isi");
                        return false;
                    }
                    if (password !== confirm_password) {
                        alert("Password dan konfirmasi password tidak cocok");
                        return false;
                    }
                    
                    if (confirm_password === "") {
                        alert("Konfirmasi password harus di isi");
                        return false;
                    }

                    if (password.length < 8) {
                        alert("Password harus lebih dari 8 karakter");
                        return false;
                    }

                    alert("Form berhasil dikirim");

                    window.location.href = "login.html";
                    
                    return true;
                }
            </script>

        </section>

    </main>

    <!-- footer -->
    <footer>

    </footer>
</body>

</html>
